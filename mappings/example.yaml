inputs:
  grants:
    file: grants.csv
    key: id

  geographic_units:
    file: geographic_units.csv
    key: code

  organisations:
    file: organisations.csv
    key: id

outputs:
  package: grants.json

mappings:
  package:
    license:
      value: "https://creativecommons.org/licenses/by/4.0/"

    publisher:
      name:
        value: "East Suffolk Trust"
      identifier:
        value: "360G-EaST"

  grant:
    id:
      from: id_360g
    title:
      from: title

    amountAwarded:
      from: amount_committed

    currency:
      value: GBP

    awardDate:
      from: award_date

    description:
      from: description

    fundingOrganization:
      - id:
          value: 'GB-CHC-1213569'
        name:
          value: 'East Suffolk Trust'
    recipientOrganization:
      - id:
          from: recipient_org_id
        name:
          from: recipient_org_name

